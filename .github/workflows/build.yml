name: Build Images

on:
  workflow_dispatch:
    inputs:
      build_riscv:
        description: 'Build RISC-V Images'
        required: true
        default: true
        type: boolean
      build_arm:
        description: 'Build ARM Images'
        required: true
        default: true
        type: boolean
      arm_mirrors:
        description: 'Arch Linux ARM mirrors'
        # Use "|" as newline separator, e.g. "Server = ...|Server = ..."
        required: true
        default: 'Server = http://de4.mirror.archlinuxarm.org/$arch/$repo|Server = http://de3.mirror.archlinuxarm.org/$arch/$repo'
        type: string
      riscv_mirror:
        description: 'Arch RISC-V mirror'
        # Use "|" as newline separator, e.g. "Server = ...|Server = ..."
        required: true
        default: 'Server = https://archriscv.felixc.at/repo/$repo'
        type: string

permissions:
  contents: write
  actions: read

jobs:
  prepare-release:
    if: ${{ inputs.build_arm == true || inputs.build_riscv == true }}
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - name: Set current date as tag name
        id: tag
        run: echo "tag_name=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          BUILD_ARM: ${{ inputs.build_arm }}
          BUILD_RISCV: ${{ inputs.build_riscv }}
        run: |
          set -euo pipefail

          if ! command -v gh >/dev/null 2>&1; then
            echo "GitHub CLI (gh) is required but not available."
            exit 1
          fi

          if [[ "$BUILD_ARM" == "true" && "$BUILD_RISCV" == "true" ]]; then
            RELEASE_TITLE="[$TAG_NAME] Beryllium OS Rolling builds"
          elif [[ "$BUILD_ARM" == "true" ]]; then
            RELEASE_TITLE="[$TAG_NAME] Beryllium OS Rolling builds (ARM)"
          else
            RELEASE_TITLE="[$TAG_NAME] Beryllium OS Rolling builds (RISC-V)"
          fi

          RELEASE_NOTES=$'These are Beryllium OS automated builds.\nThis release text may be updated later on by one or more of the team members.\n\nThese images may be more conveniently downloaded from https://beryllium.gr/'

          if ! gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$REPO" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              --draft \
              --prerelease
          else
            gh release edit "$TAG_NAME" \
              --repo "$REPO" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              --draft \
              --prerelease
          fi

  build-riscv64:
    if: ${{ inputs.build_riscv == true }}
    needs: [prepare-release]
    runs-on: ubuntu-latest
    env:
      RISCV_MIRROR: ${{ inputs.riscv_mirror }}
    container:
      image: berylliumorg/os:latest
      ports:
        - 80
      options: --privileged --cap-add=MKNOD --device=/dev/loop-control:/dev/loop-control --device=/dev/loop0:/dev/loop0 --cap-add SYS_ADMIN

    strategy:
      fail-fast: false
      matrix:
        image: [opi-rv2, opi-r2s, milkv-jupiter-image]
      max-parallel: 8

    steps:
      - name: Checkout Images
        uses: actions/checkout@v5
        with:
          path: images

      - name: Checkout mkimage
        uses: actions/checkout@v5
        with:
          repository: beryllium-org/mkimage
          path: mkimage

      - name: Install dependencies
        run: |
          init-docker
          sudo pacman -Sy --noconfirm --needed \
            python python-prettytable parted btrfs-progs dosfstools \
            git wget arch-install-scripts unzip gptfdisk xz jq which multipath-tools docker openssh github-cli

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Force Arch RISC-V mirror
        run: |
          PACMAN_CONF="images/${{ matrix.image }}/pacman.conf.riscv64"
          RISCV_MIRRORS="$(printf '%s' '${{ env.RISCV_MIRROR }}' | tr '|' '\n')"
          awk -v mirrors="$RISCV_MIRRORS" \
            '{ if ($0 ~ /^Server = /) print mirrors; else print $0 }' \
            "$PACMAN_CONF" > "$PACMAN_CONF.tmp"
          mv "$PACMAN_CONF.tmp" "$PACMAN_CONF"

      - name: Build Image
        run: |
          max_attempts=10
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt/$max_attempts for ${{ matrix.image }}"
            sudo umount -R ./work/riscv64/* || true
            sudo rm -rf /var/lib/pacman/db.lck ./out ./work

            if sudo python mkimage/mkimage.py -c images/${{ matrix.image }} -w ./work -o ./out --ci; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Upload image to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          set -euo pipefail

          mapfile -t IMAGES < <(find ./out -maxdepth 1 -type f -name '*.img.xz' | sort)
          if [ "${#IMAGES[@]}" -eq 0 ]; then
            echo "No images were built; nothing to upload."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${IMAGES[@]}" --clobber --repo "$REPO"

      - name: Cleanup
        if: always()
        run: |
          sudo umount -R ./work/riscv64/* || true
          sudo rm -rf ./work ./out

  build-arm:
    if: ${{ inputs.build_arm == true }}
    needs: [prepare-release]
    runs-on: ubuntu-24.04-arm
    env:
      ARM_MIRRORS: ${{ inputs.arm_mirrors }}
    container:
      image: berylliumorg/os:latest
      ports:
        - 80
      options: --privileged --cap-add=MKNOD --device=/dev/loop-control:/dev/loop-control --device=/dev/loop0:/dev/loop0 --cap-add SYS_ADMIN

    strategy:
      fail-fast: false
      matrix:
        image: [nova-image, nova-mainline-image, nx5-image, opi5-image, opi5plus-image, r58s-image, r58x-4g-image, r58x-image, r58x-pro-image, rock4c-plus-image, rock5a-image, rock5b-image, rock5bp-image, rock5c-image, rock5d-image, rock5t-image, rock5itx-image, cpi4-image, edge2-cinnamon-image, fydetabduo-image, vim4-gnome-image, dtv-cm5-image, radxa-cm5-image, opi5-max-image, opi5-pro-image, opi5-ultra-image, opi-cm5-image, itx-3588j-image, opi-zero3-image, opi-zero2w-image]
      max-parallel: 8

    steps:
      - name: Checkout Images
        uses: actions/checkout@v5
        with:
          path: images

      - name: Checkout mkimage
        uses: actions/checkout@v5
        with:
          repository: beryllium-org/mkimage
          path: mkimage

      - name: Install dependencies
        run: |
          init-docker
          sudo pacman -Sy --noconfirm --needed \
            python python-prettytable parted btrfs-progs dosfstools \
            git wget arch-install-scripts unzip gptfdisk xz jq edk2-rk3588-devel which multipath-tools openssh github-cli

      - name: Build Image
        run: |
          mapfile -t arm_mirrors < <(printf '%s' '${{ env.ARM_MIRRORS }}' | tr '|' '\n' | sed '/^[[:space:]]*$/d')
          if [ "${#arm_mirrors[@]}" -eq 0 ]; then
            echo "No ARM mirrors configured"
            exit 1
          fi

          cleanup_build_state() {
            sudo umount -R ./work/aarch64/* || true
            sudo rm -rf \
              /var/lib/pacman/db.lck \
              /var/lib/pacman/sync/* \
              /var/cache/pacman/pkg/* \
              ./out \
              ./work
          }

          pacman_conf="images/${{ matrix.image }}/pacman.conf.aarch64"
          pacman_conf_template="${pacman_conf}.template"
          if [ ! -f "$pacman_conf" ]; then
            echo "Missing ARM pacman config: $pacman_conf"
            exit 1
          fi
          cp "$pacman_conf" "$pacman_conf_template"

          apply_arm_mirror() {
            local mirror="$1"
            awk -v mirror="$mirror" '
              /^\[/ { in_archlinuxarm_repo = ($0 == "[core]" || $0 == "[extra]") }
              in_archlinuxarm_repo && /^Server = / { print mirror; next }
              { print }
            ' "$pacman_conf_template" > "${pacman_conf}.tmp"
            mv "${pacman_conf}.tmp" "$pacman_conf"
          }

          max_attempts=10
          attempt=1
          cleanup_build_state

          while [ "$attempt" -le "$max_attempts" ]; do
            mirror_index=$(( (attempt - 1) % ${#arm_mirrors[@]} ))
            selected_mirror="${arm_mirrors[$mirror_index]}"
            echo "Build attempt $attempt/$max_attempts for ${{ matrix.image }}"
            echo "Using ARM mirror: $selected_mirror"
            printf '%s\n' "$selected_mirror" | sudo tee /etc/pacman.d/mirrorlist > /dev/null
            apply_arm_mirror "$selected_mirror"

            if sudo python mkimage/mkimage.py -c images/${{ matrix.image }} -w ./work -o ./out --ci; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            echo "Wiping build files before retrying..."
            cleanup_build_state
            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Upload image to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          set -euo pipefail

          mapfile -t IMAGES < <(find ./out -maxdepth 1 -type f -name '*.img.xz' | sort)
          if [ "${#IMAGES[@]}" -eq 0 ]; then
            echo "No images were built; nothing to upload."
            exit 1
          fi

          gh release upload "$TAG_NAME" "${IMAGES[@]}" --clobber --repo "$REPO"

      - name: Cleanup
        if: always()
        run: |
          sudo umount -R ./work/aarch64/* || true
          sudo rm -rf ./work ./out
