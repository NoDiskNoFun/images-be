name: Build Images

on:
  workflow_dispatch:
    inputs:
      build_riscv:
        description: 'Build RISC-V Images'
        required: true
        default: true
        type: boolean
      build_arm:
        description: 'Build ARM Images'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  build-riscv64:
    if: ${{ inputs.build_riscv == true }}
    runs-on: ubuntu-latest
    container:
      image: berylliumorg/os:latest
      ports:
        - 80
      options: --privileged --cap-add=MKNOD --device=/dev/loop-control:/dev/loop-control --device=/dev/loop0:/dev/loop0 --cap-add SYS_ADMIN

    strategy:
      fail-fast: false
      matrix:
        image: [opi-rv2, milkv-jupiter-image]

    steps:
      - name: Checkout Images
        uses: actions/checkout@v4
        with:
          path: images

      - name: Checkout mkimage
        uses: actions/checkout@v4
        with:
          repository: beryllium-org/mkimage
          path: mkimage

      - name: Install dependencies
        run: |
          init-docker
          sudo pacman -Sy --noconfirm --needed \
            python python-prettytable parted btrfs-progs dosfstools \
            git wget arch-install-scripts unzip gptfdisk xz jq which multipath-tools docker openssh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build Image
        run: |
          max_attempts=25
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt/$max_attempts for ${{ matrix.image }}"
            sudo umount -R ./work/riscv64/* || true
            sudo rm -rf /var/lib/pacman/db.lck ./out ./work

            if sudo python mkimage/mkimage.py -c images/${{ matrix.image }} -w ./work -o ./out --ci; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Upload built image
        uses: actions/upload-artifact@v4
        with:
          name: riscv64-${{ matrix.image }}
          path: out/*.img.xz
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup
        if: always()
        run: |
          sudo umount -R ./work/riscv64/* || true
          sudo rm -rf ./work ./out

  build-arm:
    if: ${{ inputs.build_arm == true }}
    runs-on: ubuntu-24.04-arm
    container:
      image: berylliumorg/os:latest
      ports:
        - 80
      options: --privileged --cap-add=MKNOD --device=/dev/loop-control:/dev/loop-control --device=/dev/loop0:/dev/loop0 --cap-add SYS_ADMIN

    strategy:
      fail-fast: false
      matrix:
        image: [nova-image, nova-mainline-image, nx5-image, opi5-image, opi5plus-image, r58s-image, r58x-4g-image, r58x-image, r58x-pro-image, rock4c-plus-image, rock5a-image, rock5b-image, rock5bp-image, rock5c-image, rock5d-image, rock5t-image, rock5itx-image, cpi4-image, edge2-cinnamon-image, fydetabduo-image, vim4-gnome-image, dtv-cm5-image, radxa-cm5-image, opi5-max-image, opi5-pro-image, opi5-ultra-image, opi-cm5-image, itx-3588j-image, opi-zero3-image, opi-zero2w-image]

    steps:
      - name: Checkout Images
        uses: actions/checkout@v4
        with:
          path: images

      - name: Checkout mkimage
        uses: actions/checkout@v4
        with:
          repository: beryllium-org/mkimage
          path: mkimage

      - name: Install dependencies
        run: |
          init-docker
          sudo pacman -Sy --noconfirm --needed \
            python python-prettytable parted btrfs-progs dosfstools \
            git wget arch-install-scripts unzip gptfdisk xz jq edk2-rk3588-devel which multipath-tools openssh

      - name: Build Image
        run: |
          max_attempts=25
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt/$max_attempts for ${{ matrix.image }}"
            sudo umount -R ./work/aarch64/* || true
            sudo rm -rf /var/lib/pacman/db.lck ./out ./work

            if sudo python mkimage/mkimage.py -c images/${{ matrix.image }} -w ./work -o ./out --ci; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Upload built image
        uses: actions/upload-artifact@v4
        with:
          name: arm64-${{ matrix.image }}
          path: out/*.img.xz
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup
        if: always()
        run: |
          sudo umount -R ./work/aarch64/* || true
          sudo rm -rf ./work ./out

  release:
    if: ${{ needs.build-arm.result == 'success' || needs.build-riscv64.result == 'success' }}
    needs: [build-arm, build-riscv64]
    runs-on: [self-hosted, ARM64, Beryllium, emag]

    steps:
      - name: Set current date as tag name
        id: set_tag_name
        run: echo "TAG_NAME=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download ARM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: arm64-*
          path: ./artifacts/arm64
          merge-multiple: true

      - name: Download RISC-V artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: riscv64-*
          path: ./artifacts/riscv64
          merge-multiple: true

      - name: Create or update release and upload images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ env.TAG_NAME }}
        run: |
          set -euo pipefail

          API="https://api.github.com/repos/$REPO"

          RELEASE_RESPONSE=$(curl -sSf \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API/releases/tags/$TAG_NAME" || true)

          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id // empty')
          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url // empty' | sed 's/{?name,label}//')

          if [ -z "$RELEASE_ID" ]; then
            CREATE_RESPONSE=$(curl -sSf -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG_NAME\",\"name\":\"$TAG_NAME\",\"draft\":true,\"prerelease\":true}" \
              "$API/releases")

            RELEASE_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id')
            UPLOAD_URL=$(echo "$CREATE_RESPONSE" | jq -r '.upload_url' | sed 's/{?name,label}//')
          fi

          if [ -z "$RELEASE_ID" ] || [ -z "$UPLOAD_URL" ]; then
            echo "Failed to obtain release information."
            exit 1
          fi

          mapfile -t IMAGES < <(find ./artifacts -type f -name '*.img.xz' | sort)

          if [ "${#IMAGES[@]}" -eq 0 ]; then
            echo "No images were downloaded; skipping release upload."
            exit 0
          fi

          ASSETS_JSON=$(curl -sSf \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API/releases/$RELEASE_ID/assets")

          for img in "${IMAGES[@]}"; do
            FILENAME=$(basename "$img")
            ASSET_ID=$(echo "$ASSETS_JSON" | jq -r --arg name "$FILENAME" '.[] | select(.name == $name) | .id' | head -n1)

            if [ -n "${ASSET_ID:-}" ] && [ "$ASSET_ID" != "null" ]; then
              curl -sSf -X DELETE \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$API/releases/assets/$ASSET_ID"
            fi

            echo "Uploading $FILENAME"
            curl -sSf -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$img" \
              "$UPLOAD_URL?name=$FILENAME"
          done

      - name: Clean up
        if: always()
        run: |
          rm -rf ./artifacts
